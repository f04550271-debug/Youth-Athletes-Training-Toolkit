    function displayCards(data) {
        const container = document.getElementById("exerciseContainer");
        container.innerHTML = "";

        if (data.length === 0) {
            container.innerHTML = `<div class="no-results">🚫 No movements match the selected filters.</div>`;
            document.getElementById("countDisplay").textContent = "Showing 0 exercises";
            return;
        }

        data.forEach(ex => {
            const card = document.createElement("div");
            card.className = "card";

            // Dynamically construct properties list to ensure non-existent properties are hidden
            let specsHTML = `
                <div class="spec-item">
                    <span class="spec-label">Equipment:</span>
                    <span class="spec-value">${ex.equipment}</span>
                </div>
            `;

                specsHTML += `
                    <div class="spec-item">
                        <span class="spec-label">Unilateral:</span>
                        <span class="spec-value">${ex.unilateral}</span>
                    </div>
                `;
            }
            if (ex.direction !== undefined) {
                specsHTML += `
                    <div class="spec-item">
                        <span class="spec-label">Direction:</span>
                        <span class="spec-value">${ex.direction}</span>
                    </div>
                `;

            if (ex.movementPattern !== undefined) {
                specsHTML += `
                    <div class="spec-item">
                        <span class="spec-label">Pattern:</span>
                        <span class="spec-value">${ex.movementPattern}</span>
                    </div>
                `;
            }
            if (ex.targetArea !== undefined) {
                specsHTML += `
                    <div class="spec-item">
                        <span class="spec-label">Target Area:</span>
                        <span class="spec-value">${ex.targetArea}</span>
                    </div>
                `;
            }

            card.innerHTML = `
                <div class="card-id">#${ex.id}</div>
                <div>
                    <h3 class="card-title">${ex.exercise}</h3>
                    <div class="tag-list">
                        <span class="tag tag-cat">${ex.category}</span>
                        <span class="tag tag-stage">${ex.stage} PHV</span>
                        <span class="tag tag-diff">${ex.difficulty}</span>
                    </div>
                </div>
                <div class="meta-specs">
                    ${specsHTML}
                </div>
            `;
            container.appendChild(card);
        });
    }

    function onCategoryChange() {
        const catVal = document.getElementById("filterCategory").value;
        
        // Dynamic visibility toggles for the filter bars
        document.getElementById("grpUnilateral").classList.toggle("hidden", !["all", "Squat/Lunge", "Hip Hinge", "Upper Body Push", "Upper Body Pull"].includes(catVal));
        document.getElementById("grpDirection").classList.toggle("hidden", !["all", "Upper Body Push", "Upper Body Pull", "Power"].includes(catVal));
        document.getElementById("grpPattern").classList.toggle("hidden", !["all", "Core Movements"].includes(catVal));
        document.getElementById("grpTarget").classList.toggle("hidden", !["all", "Accessories"].includes(catVal));

        // Reset subfilters when hiding them so they do not trap matching items behind closed boxes
        if (catVal !== "all") {
            if (!["Squat/Lunge", "Hip Hinge", "Upper Body Push", "Upper Body Pull"].includes(catVal)) document.getElementById("filterUnilateral").value = "all";
            if (!["Upper Body Push", "Upper Body Pull", "Power"].includes(catVal)) document.getElementById("filterDirection").value = "all";
            if (catVal !== "Core Movements") document.getElementById("filterPattern").value = "all";
            if (catVal !== "Accessories") document.getElementById("filterTarget").value = "all";
        }

        applyFilters();
    }

    function applyFilters() {
        const catVal = document.getElementById("filterCategory").value;
        const diffVal = document.getElementById("filterDifficulty").value;
        const stageVal = document.getElementById("filterStage").value;
        const uniVal = document.getElementById("filterUnilateral").value;
        const dirVal = document.getElementById("filterDirection").value;
        const patVal = document.getElementById("filterPattern").value;
        const targetVal = document.getElementById("filterTarget").value;

        const filtered = exerciseDataset.filter(ex => {
            if (catVal !== "all" && ex.category !== catVal) return false;
            if (diffVal !== "all" && ex.difficulty !== diffVal) return false;
            
            // Cleaned strict verification logic for PHV stage values
            if (stageVal !== "all") {
                if (stageVal === "Pre" && !ex.stage.includes("Pre") && ex.stage !== "All") return false;
                if (stageVal === "Circa" && !ex.stage.includes("Circa") && ex.stage !== "All") return false;
                if (stageVal === "Post" && !ex.stage.includes("Post") && ex.stage !== "All") return false;
            }
            
            // Clean target dropdown filter evaluations
            if (!document.getElementById("grpUnilateral").classList.contains("hidden") && uniVal !== "all" && ex.unilateral !== uniVal) return false;
            if (!document.getElementById("grpDirection").classList.contains("hidden") && dirVal !== "all" && ex.direction !== dirVal) return false;
            if (!document.getElementById("grpPattern").classList.contains("hidden") && patVal !== "all" && ex.movementPattern !== patVal) return false;
            if (!document.getElementById("grpTarget").classList.contains("hidden") && targetVal !== "all" && ex.targetArea !== targetVal) return false;

            return true;
        });

        displayCards(filtered);
    }

    // App Initialization
    displayCards(exerciseDataset);
</script>
</body>
</html>
